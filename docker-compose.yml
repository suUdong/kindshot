version: "3.8"

services:
  kindshot:
    build: .
    container_name: kindshot
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: ["python", "-m", "kindshot", "--paper"]
